<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Page Not Found | The Agilists</title>
  <meta name="robots" content="noindex" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700;900&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --navy: #0d1b4b;
      --navy2: #162260;
      --navy3: #1e2e7a;
      --blue: #2451ff;
      --blue-lt: #4f72ff;
      --sky: #e8eeff;
      --white: #ffffff;
      --radius: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: 'Outfit', sans-serif;
      color: var(--white);
      background: radial-gradient(1200px 600px at 70% -10%, var(--navy3), transparent 60%),
                  linear-gradient(160deg, var(--navy) 0%, var(--navy2) 55%, var(--navy) 100%);
      background-attachment: fixed;
      position: relative;
      overflow-x: hidden;
    }
    /* faint grid overlay to match the hero */
    body::before {
      content: "";
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 64px 64px;
      pointer-events: none;
      z-index: 0;
    }
    .wordmark {
      position: relative; z-index: 1;
      padding: 2rem 6%;
      font-weight: 600;
      letter-spacing: 0.22em;
      font-size: 0.9rem;
      color: var(--white);
      text-decoration: none;
      display: inline-flex;
      align-items: baseline;
      gap: 0.5rem;
    }
    .wordmark span { font-size: 0.6rem; letter-spacing: 0.18em; color: var(--blue-lt); }
    main {
      position: relative; z-index: 1;
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 2rem 6% 4rem;
    }
    .eyebrow {
      display: inline-block;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 999px;
      padding: 0.4rem 1.1rem;
      font-size: 0.78rem;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--sky);
      margin-bottom: 1.75rem;
    }
    .eyebrow::before { content: "● "; color: var(--blue-lt); font-size: 0.7em; }
    .code {
      font-family: 'Playfair Display', serif;
      font-weight: 900;
      line-height: 0.9;
      font-size: clamp(6rem, 22vw, 13rem);
      color: var(--blue-lt); /* solid fallback if background-clip:text is unsupported */
      margin-bottom: 0.5rem;
    }
    @supports ((-webkit-background-clip: text) or (background-clip: text)) {
      .code {
        background: linear-gradient(120deg, var(--white) 20%, var(--blue-lt) 100%);
        -webkit-background-clip: text;
        background-clip: text;
        -webkit-text-fill-color: transparent;
      }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-weight: 700;
      font-size: clamp(1.6rem, 4vw, 2.6rem);
      margin-bottom: 1rem;
    }
    p.lead {
      max-width: 30rem;
      color: var(--sky);
      font-weight: 300;
      line-height: 1.7;
      font-size: 1.05rem;
      margin-bottom: 2.25rem;
    }
    .actions { display: flex; flex-wrap: wrap; gap: 0.9rem; justify-content: center; }
    a.btn {
      text-decoration: none;
      font-weight: 500;
      font-size: 0.95rem;
      padding: 0.8rem 1.8rem;
      border-radius: var(--radius);
      transition: background 0.2s, border-color 0.2s, transform 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
    }
    a.btn-primary { background: var(--blue); color: var(--white); }
    a.btn-primary:hover { background: var(--blue-lt); transform: translateY(-2px); }
    a.btn-ghost { background: transparent; color: var(--white); border: 1px solid rgba(255,255,255,0.28); }
    a.btn-ghost:hover { border-color: var(--white); transform: translateY(-2px); }
    .links {
      margin-top: 2.5rem;
      font-size: 0.9rem;
      color: rgba(255,255,255,0.65);
    }
    .links a { color: var(--sky); text-decoration: none; margin: 0 0.6rem; }
    .links a:hover { color: var(--white); text-decoration: underline; }
    a:focus-visible { outline: 2px solid var(--sky); outline-offset: 3px; border-radius: var(--radius); }
    footer {
      position: relative; z-index: 1;
      text-align: center;
      padding: 1.5rem 6%;
      font-size: 0.8rem;
      color: rgba(255,255,255,0.6);
    }
  </style>
</head>
<body>
  <a class="wordmark" href="/">THE AGILISTS</a>

  <main>
    <div class="eyebrow">Error 404</div>
    <div class="code">404</div>
    <h1>This page took an unplanned sprint.</h1>
    <p class="lead">The page you're looking for has moved, been retired, or never existed. Let's get you back on track.</p>
    <div class="actions">
      <a class="btn btn-primary" href="/">← Back to home</a>
      <a class="btn btn-ghost" href="/#contact">Get in touch</a>
    </div>
    <div class="links">
      <a href="/#services">Services</a> ·
      <a href="/#about">About</a> ·
      <a href="/#contact">Contact</a>
    </div>
  </main>

  <footer>© The Agilists Pvt Ltd — Digital Transformation &amp; Technology Consulting</footer>
</body>
</html>
